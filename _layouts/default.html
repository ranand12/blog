<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="nav-logo">cloud-monk</a>
      <div class="nav-right">
        <button class="nav-search" onclick="document.getElementById('searchOverlay').classList.add('active'); document.getElementById('searchInput').focus();" aria-label="Search">
          <span class="nav-search-text">search</span>
          <kbd class="nav-kbd">&#8984;K</kbd>
        </button>
        <a href="{{ '/about/' | relative_url }}" class="nav-link">about</a>
      </div>
    </nav>

    <main>
      {{ content }}
    </main>

    <!-- Search Modal -->
    <div class="search-overlay" id="searchOverlay">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="Search posts..." autocomplete="off">
        <div class="search-results" id="searchResults">
          <div class="search-hint">Type to search across all content</div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="footer-social">
        <a href="mailto:{{ site.author.email }}" aria-label="Email">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </a>
        <a href="https://twitter.com/{{ site.author.twitter }}" target="_blank" rel="noopener" aria-label="X/Twitter">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    // Search data
    var searchData = [
      {% for post in site.posts %}
      {
        title: {{ post.title | jsonify }},
        url: {{ post.url | relative_url | jsonify }},
        date: {{ post.date | date: "%B %Y" | jsonify }},
        categories: {{ post.categories | jsonify }},
        tags: {{ post.tags | default: "" | jsonify }},
        link: {{ post.link | default: "" | jsonify }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    // Search
    var overlay = document.getElementById('searchOverlay');
    var input = document.getElementById('searchInput');
    var results = document.getElementById('searchResults');

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        overlay.classList.toggle('active');
        if (overlay.classList.contains('active')) {
          input.value = '';
          input.focus();
          results.innerHTML = '<div class="search-hint">Type to search across all content</div>';
        }
      }
      if (e.key === 'Escape') {
        overlay.classList.remove('active');
      }
    });

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });

    input.addEventListener('input', function() {
      var q = this.value.toLowerCase().trim();
      if (!q) {
        results.innerHTML = '<div class="search-hint">Type to search across all content</div>';
        return;
      }
      var matches = searchData.filter(function(item) {
        var haystack = (item.title + ' ' + item.categories.join(' ') + ' ' + (item.tags || '')).toLowerCase();
        return haystack.indexOf(q) !== -1;
      });
      if (matches.length === 0) {
        results.innerHTML = '<div class="search-hint">No results found</div>';
        return;
      }
      results.innerHTML = matches.map(function(item) {
        var href = item.link || item.url;
        var target = item.link ? ' target="_blank" rel="noopener"' : '';
        return '<a class="search-result-item" href="' + href + '"' + target + '>' +
          '<div class="search-result-title">' + item.title + '</div>' +
          '<div class="search-result-meta">' + item.date + ' &middot; ' + item.categories.join(', ') + '</div>' +
          '</a>';
      }).join('');
    });
  </script>
</body>
</html>
