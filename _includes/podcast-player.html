{% if page.file %}
<div class="podcast-player">
  <audio controls preload="none" style="width: 100%;">
    <source src="{{ page.file }}" type="audio/mp4">
    Your browser does not support the audio element.
  </audio>
  {% if page.podcast_duration %}<p class="podcast-meta">Duration: {{ page.podcast_duration }}</p>{% endif %}
</div>
{% endif %}
